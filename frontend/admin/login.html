<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 商品价格查询系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md fade-in">
        <!-- 品牌标识 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-500 rounded-2xl shadow-lg mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">价格查询系统</h1>
            <p class="text-slate-500 mt-1" id="page-subtitle">管理后台</p>
        </div>

        <!-- 登录卡片 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 slide-up" id="login-card">
            <!-- 登录表单 -->
            <div id="login-form">
                <div class="mb-5">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">用户名</label>
                    <input type="text" id="username" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">密码</label>
                    <input type="password" id="password" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <div id="error-msg" class="text-red-500 text-sm mb-4 hidden"></div>
                <button id="btn-login" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-medium py-2.5 px-4 rounded-xl transition shadow-sm" onclick="handleLogin()">登 录</button>
            </div>
            <!-- 初始化表单 -->
            <div id="init-form" class="hidden">
                <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6 text-sm text-blue-700">
                    <p class="font-medium mb-1">🚀 首次运行初始化</p>
                    <p>请创建管理员账号，初始化系统配置。</p>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">管理员用户名</label>
                    <input type="text" id="init-username" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition" placeholder="至少2个字符">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">密码</label>
                    <input type="password" id="init-password" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition" placeholder="至少6个字符">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">确认密码</label>
                    <input type="password" id="init-confirm" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition" placeholder="再次输入密码">
                </div>
                <div id="init-error" class="text-red-500 text-sm mb-4 hidden"></div>
                <button id="btn-init" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-2.5 px-4 rounded-xl transition shadow-sm" onclick="handleInit()">完成初始化</button>
            </div>
        </div>
        <p class="text-center text-xs text-slate-400 mt-6">v260425 &middot; 商品价格查询系统</p>
    </div>
    <script src="../admin/js/api.js"></script>
    <script>
        // 检查是否为首次初始化
        async function checkInit() {
            const result = await adminAPI.checkAuth();
            if (result && result.success) {
                window.location.href = '/admin/dashboard.html';
                return;
            }
            // 尝试调用 init/setup 的 GET 方式来检测是否已初始化
            try {
                const resp = await fetch('/api/admin/init/setup', { method: 'GET' });
                // 如果返回400说明已初始化，显示登录；否则显示初始化
                if (resp.status !== 400) {
                    document.getElementById('page-subtitle').textContent = '首次初始化';
                    document.getElementById('login-form').classList.add('hidden');
                    document.getElementById('init-form').classList.remove('hidden');
                    return;
                }
            } catch(e) {}
            // 默认显示登录
        }

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            const btn = document.getElementById('btn-login');
            if (!username || !password) {
                errorEl.textContent = '请输入用户名和密码';
                errorEl.classList.remove('hidden');
                return;
            }
            errorEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = '登录中...';
            const result = await adminAPI.login(username, password);
            btn.disabled = false;
            btn.textContent = '登 录';
            if (result && result.success) {
                window.location.href = '/admin/dashboard.html';
            } else {
                errorEl.textContent = result?.message || '登录失败';
                errorEl.classList.remove('hidden');
            }
        }

        async function handleInit() {
            const username = document.getElementById('init-username').value.trim();
            const password = document.getElementById('init-password').value;
            const confirm = document.getElementById('init-confirm').value;
            const errorEl = document.getElementById('init-error');
            const btn = document.getElementById('btn-init');
            if (!username || username.length < 2) {
                errorEl.textContent = '用户名至少2个字符';
                errorEl.classList.remove('hidden'); return;
            }
            if (!password || password.length < 6) {
                errorEl.textContent = '密码至少6个字符';
                errorEl.classList.remove('hidden'); return;
            }
            if (password !== confirm) {
                errorEl.textContent = '两次密码输入不一致';
                errorEl.classList.remove('hidden'); return;
            }
            errorEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = '初始化中...';
            const result = await adminAPI.setup(username, password);
            btn.disabled = false;
            btn.textContent = '完成初始化';
            if (result && result.success) {
                window.location.href = '/admin/dashboard.html';
            } else {
                errorEl.textContent = result?.message || '初始化失败';
                errorEl.classList.remove('hidden');
            }
        }

        // 回车提交
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const initForm = document.getElementById('init-form');
                if (!initForm.classList.contains('hidden')) {
                    handleInit();
                } else {
                    handleLogin();
                }
            }
        });

        checkInit();
    </script>
</body>
</html>
