<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 - 商品价格查询系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8'}}}}}</script>
    <style>.fade-in{animation:fadeIn 0.4s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.stat-card{transition:all 0.2s}.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08)}</style>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-primary-500 rounded-lg flex items-center justify-center"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div>
            <span class="font-semibold text-slate-800">价格查询系统</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex gap-1">
                <a href="/admin/dashboard.html" class="px-3 py-1.5 text-sm bg-primary-50 text-primary-600 rounded-lg font-medium">控制台</a>
                <a href="/admin/datasource.html" class="px-3 py-1.5 text-sm text-slate-600 hover:text-slate-800 rounded-lg transition">数据源</a>
                <a href="/admin/settings.html" class="px-3 py-1.5 text-sm text-slate-600 hover:text-slate-800 rounded-lg transition">设置</a>
            </div>
            <span id="nav-user" class="text-sm text-slate-500"></span>
            <button onclick="logout()" class="text-sm text-red-500 hover:text-red-600 transition">退出</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-8 fade-in">
        <h2 class="text-xl font-bold text-slate-800 mb-6">控制台</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8" id="stats-container">
            <div class="stat-card bg-white rounded-xl border border-slate-200 p-6">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center"><svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg></div>
                    <span class="text-sm font-medium text-slate-500">数据源总数</span>
                </div>
                <p class="text-3xl font-bold text-slate-800" id="stat-ds-total">-</p>
            </div>
            <div class="stat-card bg-white rounded-xl border border-slate-200 p-6">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 bg-emerald-50 rounded-xl flex items-center justify-center"><svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                    <span class="text-sm font-medium text-slate-500">已启用</span>
                </div>
                <p class="text-3xl font-bold text-slate-800" id="stat-active">-</p>
            </div>
            <div class="stat-card bg-white rounded-xl border border-slate-200 p-6">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center"><svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
                    <span class="text-sm font-medium text-slate-500">系统版本</span>
                </div>
                <p class="text-3xl font-bold text-slate-800" id="stat-version">-</p>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 p-6">
            <h3 class="font-medium text-slate-800 mb-4">快速入口</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <a href="/admin/datasource.html" class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 hover:border-primary-300 hover:bg-primary-50 transition">
                    <div class="w-10 h-10 bg-primary-50 rounded-xl flex items-center justify-center"><svg class="w-5 h-5 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg></div>
                    <div><p class="font-medium text-slate-800">数据源管理</p><p class="text-sm text-slate-500">配置数据库连接</p></div>
                </a>
                <a href="/admin/settings.html" class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 hover:border-primary-300 hover:bg-primary-50 transition">
                    <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center"><svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
                    <div><p class="font-medium text-slate-800">系统设置</p><p class="text-sm text-slate-500">修改密码与Token</p></div>
                </a>
            </div>
        </div>
    </main>

    <script src="../admin/js/api.js"></script>
    <script src="../admin/js/app.js"></script>
    <script>
        async function loadStats() {
            const auth = await checkLogin();
            if (!auth) return;
            document.getElementById('nav-user').textContent = auth.username || '';
            const result = await adminAPI.getDashboardStats();
            if (result?.success) {
                document.getElementById('stat-ds-total').textContent = result.data.datasource_count;
                document.getElementById('stat-active').textContent = result.data.active_count;
                document.getElementById('stat-version').textContent = result.data.version || '-';
            }
        }
        loadStats();
    </script>
</body>
</html>
